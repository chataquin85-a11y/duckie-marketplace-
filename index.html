<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Marketplace</title>
    <style>
        body { 
            font-family: sans-serif; 
            /* Fondo con el pato (Duck) */
            background-image: url('https://i.ibb.co/3s8sX1S/background.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            padding: 20px; 
            text-align: center; 
        }
        .product-card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 15px; 
            padding: 20px; 
            margin: 20px auto; 
            max-width: 400px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
        .product-card img { width: 100%; height: auto; border-radius: 10px; }
        h1 { color: white; text-shadow: 2px 2px 4px #000; }
        .price { font-size: 1.5em; color: #2ecc71; font-weight: bold; margin: 10px 0; }
        .pay-btn { display: block; background-color: #ffc439; padding: 15px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 15px; color: black; }
    </style>
</head>
<body>

    <h1>Duckie Marketplace</h1>

    <div class="product-card">
        <img src="https://i.ibb.co/6yCqF81H/IMG-4720.jpg" alt="Nutribullet Juicer">
        <h3>Nutribullet Juicer</h3>
        <p class="price">$80.00 USD</p>
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=o.apolonio@yahoo.com&item_name=Nutribullet+Juicer&amount=80.00&currency_code=USD" class="pay-btn">Pagar con PayPal</a>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/h1Kz3B4d/IMG-4722.jpg" alt="Jeans H&M">
        <h3>Jeans H&M Straight Fit</h3>
        <p class="price">$25.00 USD</p>
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=o.apolonio@yahoo.com&item_name=Jeans+HM+Straight+Fit&amount=25.00&currency_code=USD" class="pay-btn">Pagar con PayPal</a>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/k2CLY2Nb/IMG-4725.jpg" alt="Chamarra Zara">
        <h3>Chamarra Zara Man</h3>
        <p class="price">$80.00 USD</p>
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=o.apolonio@yahoo.com&item_name=Chamarra+Zara+Man&amount=80.00&currency_code=USD" class="pay-btn">Pagar con PayPal</a>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/Df58zdnn/IMG-4726.jpg" alt="Chamarra Guess">
        <h3>Chamarra Guess Classic</h3>
        <p class="price">$45.00 USD</p>
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=o.apolonio@yahoo.com&item_name=Chamarra+Guess+Classic&amount=45.00&currency_code=USD" class="pay-btn">Pagar con PayPal</a>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/Kcfg067y/IMG-4728.jpg" alt="Sudadera H&M">
        <h3>Sudadera H&M (Talla M)</h3>
        <p class="price">$40.00 USD</p>
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=o.apolonio@yahoo.com&item_name=Sudadera+HM+Talla+M&amount=40.00&currency_code=USD" class="pay-btn">Pagar con PayPal</a>
    </div>

</body>
</html>
