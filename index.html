<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Marketplace</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; padding: 20px; text-align: center; }
        .marketplace-container { max-width: 500px; margin: auto; }
        .product-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        .price { font-size: 1.2em; font-weight: bold; color: #2c3e50; margin: 10px 0; }
    </style>
</head>
<body>

<div class="marketplace-container">
    <h1>Duckie Marketplace</h1>

    <div class="product-card">
        <img src="https://i.ibb.co/G4mQ5sXv/zara.jpg" alt="Suéter Zara Man">
        <h3>Suéter Zara Man</h3>
        <p class="price">$60.00 USD</p>
        <div id="paypal-button-zara"></div>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/v4yXY9dg/guess.jpg" alt="Suéter Guess">
        <h3>Suéter Guess Gris</h3>
        <p class="price">$45.00 USD</p>
        <div id="paypal-button-guess"></div>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/Rpq2hPK1/hm.jpg" alt="Suéter H&M">
        <h3>Suéter H&M Gris</h3>
        <p class="price">$30.00 USD</p>
        <div id="paypal-button-hm"></div>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/MybND48v/jeans.jpg" alt="Jeans">
        <h3>Jeans de Mezclilla Azul</h3>
        <p class="price">$25.00 USD</p>
        <div id="paypal-button-jeans"></div>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/zVmzVrTt/nutribullet.jpg" alt="Nutribullet">
        <h3>Nutribullet</h3>
        <p class="price">$75.00 USD</p>
        <div id="paypal-button-nutri"></div>
    </div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=AX6WGj-DnlYMU-YfzsPd3DF89FOORsQrn08QyydnX-i-ilVnf0SisRD4-eA1aK83tPwOy10jNK6-aSW7&currency=USD"></script>
<script>
    function renderBtn(id, val) {
        paypal.Buttons({
            createOrder: (data, actions) => {
                return actions.order.create({ purchase_units: [{ amount: { value: val } }] });
            }
        }).render(id);
    }
    renderBtn('#paypal-button-zara', '60.00');
    renderBtn('#paypal-button-guess', '45.00');
    renderBtn('#paypal-button-hm', '30.00');
    renderBtn('#paypal-button-jeans', '25.00');
    renderBtn('#paypal-button-nutri', '75.00');
</script>
</body>
</html>
