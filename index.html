<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duckie AI Marketplace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header style="text-align: center; padding: 20px; background: #007bff; color: white;">
    <h1>Duckie AI Marketplace</h1>
    <p>Items available for sale</p>
  </header>

  <div id="contenedor-productos" style="display: flex; flex-wrap: wrap; justify-content: center; padding: 20px;"></div>

      <!-- Contenedor del Login con Formulario Real -->
    <div id="login-container" style="text-align: center; margin-top: 30px; padding: 20px; border: 1px solid #ccc; max-width: 400px; margin-left: auto; margin-right: auto;">
        <h3>Admin Login</h3>
        <form id="login-form">
            <input type="email" id="login-email" placeholder="Correo electrónico" style="width: 90%; padding: 10px; margin-bottom: 10px;" required>
            <br>
            <input type="password" id="login-contrasena" placeholder="Contraseña" style="width: 90%; padding: 10px; margin-bottom: 15px;" required>
            <br>
            <button type="submit" id="btn-login" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; width: 50%;">Entrar</button>
        </form>
    </div>

    <!-- LIBRERÍAS OFICIALES DE FIREBASE (Esenciales para que funcione) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <!-- TU CONFIGURACIÓN DE FIREBASE -->
    <script>    <!-- TU CONFIGURACIÓN DE FIREBASE -->
    <script>
      var firebaseConfig = {
        apiKey: "TU_API_KEY_REAL",
        authDomain: "duckie-marketplace-.firebaseapp.com",
        projectId: "duckie-marketplace-",
        storageBucket: "duckie-marketplace-.appspot.com",
        messagingSenderId: "TU_SENDER_ID",
        appId: "TU_APP_ID"
      };
      // Inicializar Firebase
      firebase.initializeApp(firebaseConfig);
    </script>

      // Pegar aquí abajo tus credenciales de Firebase que configuramos ayer si te las pide,
      // pero por ahora probemos dejando que el script cargue.
    </script>

    <!-- Tu script principal (Sin el type="module" para evitar bloqueos en GitHub Pages) -->
    <script src="script.js"></script>
</body>
</html>
