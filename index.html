<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Marketplace</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 40px; background-color: #f4f4f9; }
        .marketplace-container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .product-card { margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        #paypal-button-container { margin-top: 20px; }
    </style>
</head>
<body>

    <div class="marketplace-container">
        <h1>Duckie Marketplace</h1>
        <div class="product-card">
            <h2>Producto en Venta</h2>
            <p>Descripción detallada de tu producto aquí.</p>
            <p><strong>Precio: $10.00 USD</strong></p>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=AUTmiwW5tG1x1p-f4KDPmNo2BIE0tvzN28iQXZhIzKnXxH0IEI6-KDTXJAFg3ohTJ6v5PLO4dwugrbVe&currency=USD"></script>
    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{ amount: { value: '10.00' } }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('¡Pago recibido con éxito de ' + details.payer.name.given_name + '!');
                });
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
