<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Marketplace</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f4; padding: 20px; text-align: center; }
        .product-card { background: white; border-radius: 15px; padding: 20px; margin: 20px auto; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: auto; border-radius: 10px; }
        h1 { color: #333; }
        .price { font-size: 1.5em; color: #2ecc71; font-weight: bold; margin: 10px 0; }
        .pay-btn { display: block; background-color: #ffc439; color: black; padding: 15px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>Duckie Marketplace</h1>

    <div class="product-card">
        <img src="https://i.ibb.co/6yCqF81H/IMG-4720.jpg" alt="Nutribullet Juicer">
        <h3>Nutribullet Juicer</h3>
        <p class="price">$80.00 USD</p>
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=o.apolonio@yahoo.com&item_name=Nutribullet+Juicer&amount=80.00&currency_code=USD" class="pay-btn">Pagar con PayPal</a>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/h1Kz3B4d/IMG-4722.jpg" alt="Jeans H&M">
        <h3>Jeans H&M Straight Fit (36/34)</h3>
        <p class="price">$25.00 USD</p>
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=o.apolonio@yahoo.com&item_name=Jeans+HM&amount=25.00&currency_code=USD" class="pay-btn">Pagar con PayPal</a>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/k2CLY2Nb/IMG-4725.jpg" alt="Chamarra Zara">
        <h3>Chamarra Basic Zara Man</h3>
        <p class="price">$50.00 USD</p>
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=o.apolonio@yahoo.com&item_name=Chamarra+Zara&amount=50.00&currency_code=USD" class="pay-btn">Pagar con PayPal</a>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/Df58zdnn/IMG-4726.jpg" alt="Chamarra Guess">
        <h3>Chamarra Guess</h3>
        <p class="price">$45.00 USD</p>
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=o.apolonio@yahoo.com&item_name=Chamarra+Guess&amount=45.00&currency_code=USD" class="pay-btn">Pagar con PayPal</a>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/Kcfg067y/IMG-4728.jpg" alt="Sudadera H&M">
        <h3>Sudadera H&M (Talla M)</h3>
        <p class="price">$20.00 USD</p>
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=o.apolonio@yahoo.com&item_name=Sudadera+HM&amount=20.00&currency_code=USD" class="pay-btn">Pagar con PayPal</a>
    </div>

</body>
</html>
