<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duckie AI Marketplace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header style="text-align: center; padding: 20px; background: #007bff; color: white;">
    <h1>Duckie AI Marketplace</h1>
    <p>Items available for sale</p>
  </header>

  <div id="contenedor-productos" style="display: flex; flex-wrap: wrap; justify-content: center; padding: 20px;"></div>

  <  <div id="login-container" style="text-align: center; margin-top: 30px; padding: 20px; border: 1px solid #ccc; max-width: 300px; margin-left: auto; margin-right: auto;">
    <h3>Admin Login</h3>
    <input type="email" id="login-email" placeholder="Correo electrónico" style="width: 90%; padding: 8px; margin-bottom: 10px;">
    <br>
    <input type="password" id="login-contrasena" placeholder="Contraseña" style="width: 90%; padding: 8px; margin-bottom: 10px;">
    <br>
    <button id="btn-login" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer;">Entrar</button>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
